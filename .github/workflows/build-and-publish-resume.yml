name: Build and publish resume PDF

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Install XeLaTeX and required packages
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            texlive-xetex texlive-latex-extra texlive-fonts-recommended texlive-fonts-extra \
            ghostscript

      - name: Build PDF with XeLaTeX
        run: |
          xelatex -interaction=nonstopmode main.tex
          xelatex -interaction=nonstopmode main.tex
          cp main.pdf resume.pdf

      - name: Compress resume.pdf with Ghostscript
        run: |
          gs -sDEVICE=pdfwrite -dCompatibilityLevel=1.4 -dPDFSETTINGS=/printer \
            -dNOPAUSE -dQUIET -dBATCH \
            -sOutputFile=resume_compressed.pdf resume.pdf
          if [ -s resume_compressed.pdf ]; then
            mv resume_compressed.pdf resume.pdf
            echo "Compressed resume.pdf size: $(du -sh resume.pdf | cut -f1)"
          else
            echo "Ghostscript compression failed; keeping original resume.pdf" >&2
            rm -f resume_compressed.pdf
          fi

      - name: Commit resume.pdf if changed
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ ! -f resume.pdf ]; then echo "resume.pdf not found" >&2; exit 1; fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f resume.pdf
          git commit -m "ci: update resume.pdf" || echo "no changes"
          git push origin HEAD:main

      - name: Trigger resume build on angelorscoelho.dev
        env:
          DEV_REPO_PAT: ${{ secrets.DEV_REPO_PAT }}
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $DEV_REPO_PAT" \
            -H "X-GitHub-API-Version: 2022-11-28" \
            https://api.github.com/repos/angelorscoelho/angelorscoelho.dev/actions/workflows/build_resume.yml/dispatches \
            -d '{"ref":"main"}'

      - name: Upload resume artifact
        uses: actions/upload-artifact@v4
        with:
          name: resume.pdf
          path: resume.pdf
